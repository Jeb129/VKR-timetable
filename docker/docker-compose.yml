services:
  vkr-backend:
    build:
      context: ..
      dockerfile: docker/backend-dockerfile
    container_name: backend
    volumes:
      - ../backend:/app
      - ../backend/static:/var/www/static
      - ../backend/media:/var/www/media
    env_file:
      - ../backend/.env
    ports:
      - "8000:8000"
  vkr-frontend:
      build:
        context: ..
        dockerfile: docker/frontend-dockerfile
      container_name: frontend
      env_file:
      - ../frontend/.env
      ports:
        - "80:80"
  vkr-redis:
    image: redis:7-alpine
    container_name: redis
    command: >
      sh -c "
              redis-server --requirepass 123321
            "
    env_file:
    - ../redis/.env
    ports:
      - "6379:6379"
    volumes:
      - ../redis/data:/data
    restart: unless-stopped
