services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend-dockerfile
    container_name: backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    env_file:
      - ../backend/.env
    ports:
      - "8000:8000"
  frontend:
      build:
        context: ..
        dockerfile: docker/frontend-dockerfile
      container_name: frontend
      ports:
        - "3000:80"
